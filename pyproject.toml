[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "atomi"
version = "0.5.23"
description = "Reusable HPC workflow tools for computational materials science."
readme = "README.md"
requires-python = ">=3.9"
authors = [
  { name = "Your Name" }
]
dependencies = [
  "ase>=3.23",
  "mp-api",
  "periodictable",
  "xraydb",
]

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "ruff>=0.6",
]
materials = [
  "ase>=3.23",
  "pymatgen>=2024.5",
]
calphad = [
  "pycalphad",
]
scattering = [
  "ase>=3.23",
  "periodictable",
  "xraydb",
]
xafs = [
  "xraydb",
  "xraylarch; python_version >= '3.10'",
]
zentropy = [
  "pyzentropy; python_version >= '3.10'",
]
elastic-viz = []

[project.scripts]
atomi = "atomi.cli.main:main"
