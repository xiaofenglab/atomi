[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
atomi = [
  "templates/**/*.yaml",
  "templates/**/*.sh",
  "templates/**/*.json",
  "shell/*.sh",
  "viz/gnuplot/*.gp",
  "viz/cp2k/*.gp",
  "viz/cp2k/*.py",
  "viz/mace/*.gp",
]

[tool.ruff]
line-length = 100
target-version = "py39"
