[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "atomi"
version = "0.1.0"
description = "Reusable HPC automation tools for atomistic modeling workflows."
readme = "README.md"
requires-python = ">=3.9"
authors = [
  { name = "Your Name" }
]
dependencies = []

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "ruff>=0.6",
]
materials = [
  "ase>=3.23",
  "pymatgen>=2024.5",
]

[project.scripts]
atomi = "atomi.cli.main:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
atomi = ["templates/**/*.yaml", "templates/**/*.sh", "shell/*.sh"]

[tool.ruff]
line-length = 100
target-version = "py39"
